name: docker
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - name: Backend image
        run: |
          docker build -f backend/Dockerfile -t ghcr.io/${{ github.repository_owner }}/job-portal-backend:latest -t ghcr.io/${{ github.repository_owner }}/job-portal-backend:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/job-portal-backend:latest
          docker push ghcr.io/${{ github.repository_owner }}/job-portal-backend:${{ github.sha }}
      - name: Frontend image
        run: |
          docker build -f frontend/Dockerfile -t ghcr.io/${{ github.repository_owner }}/job-portal-frontend:latest -t ghcr.io/${{ github.repository_owner }}/job-portal-frontend:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/job-portal-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/job-portal-frontend:${{ github.sha }}
